<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>FINTrack — Tax Calculator</title>
<link rel="stylesheet" href="design-system.css" />
<link rel="stylesheet" href="settings-modal.css" />
<style>
  /* faint terminal grid */
  body::before {
    content: '';
    position: fixed; inset: 0;
    background-image:
      linear-gradient(to right, rgba(230,233,243,0.025) 1px, transparent 1px),
      linear-gradient(to bottom, rgba(230,233,243,0.025) 1px, transparent 1px);
    background-size: 56px 56px;
    pointer-events: none;
    z-index: 0;
  }
  .app {
    display: grid;
    grid-template-columns: 220px 1fr;
    min-height: 100vh;
    position: relative;
    z-index: 1;
  }

  /* shell */
  .sidebar {
    background: var(--sidebar);
    border-right: 1px solid var(--line);
    padding: var(--s-5) var(--s-4);
    display: flex; flex-direction: column;
    gap: var(--s-5);
    position: sticky; top: 0; height: 100vh;
  }
  .brand { display: flex; align-items: center; gap: var(--s-3); padding: 0 var(--s-2) var(--s-4); border-bottom: 1px solid var(--line); }
  .brand__mark {
    width: 28px; height: 28px; border-radius: var(--r-2);
    background: var(--primary); color: var(--background);
    display: grid; place-items: center;
    font-weight: 700; font-size: 14px;
    box-shadow: 0 0 14px rgba(var(--primary-rgb), 0.4);
  }
  .brand__name { font-size: 14px; font-weight: 500; letter-spacing: var(--tr-wide); }
  .brand__name span { color: var(--muted-foreground); }
  .nav { display: flex; flex-direction: column; gap: 2px; flex: 1; }

  .topbar {
    display: flex; align-items: center; justify-content: space-between;
    padding: var(--s-4) var(--s-6);
    border-bottom: 1px solid var(--line);
    background: var(--background);
  }
  .topbar__date { font-size: var(--t-small); color: var(--muted-foreground); letter-spacing: var(--tr-wide); }
  .topbar__date b {
    color: var(--foreground); font-weight: 500;
    text-transform: uppercase; letter-spacing: var(--tr-wider);
    font-size: var(--t-micro); margin-right: var(--s-2);
  }
  .topbar__status { display: inline-flex; align-items: center; gap: var(--s-2); font-size: var(--t-micro); letter-spacing: var(--tr-wider); text-transform: uppercase; color: var(--muted-foreground); }
  .topbar__status b { color: var(--foreground); font-weight: 500; }

  main { padding: var(--s-6) var(--s-6) var(--s-7); display: flex; flex-direction: column; gap: var(--s-5); }

  /* page head */
  .page-head { display: flex; align-items: center; justify-content: space-between; gap: var(--s-5); }
  .page-head__title { font-size: var(--t-h1); font-weight: 500; letter-spacing: var(--tr-tight); margin: 0; line-height: 1; }
  .page-head__right { display: flex; align-items: center; gap: var(--s-3); }

  /* tax year dropdown — uses chip style from tx page */
  .input--chip {
    background: var(--muted);
    border: 1px solid var(--line);
    color: var(--foreground);
    border-radius: var(--r-2);
    padding: 7px 12px;
    font-family: var(--font);
    font-size: var(--t-small);
    display: inline-flex; align-items: center; gap: var(--s-2);
    cursor: pointer;
    min-height: 32px;
  }
  .input--chip:hover { border-color: var(--line-strong); }
  .input--chip select {
    background: transparent; border: none; outline: none;
    color: var(--foreground); font: inherit; cursor: pointer;
    appearance: none; padding-right: 16px;
    background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='10' height='10' viewBox='0 0 10 10'><path d='M2 4l3 3 3-3' stroke='%23717799' stroke-width='1.4' fill='none' stroke-linecap='round'/></svg>");
    background-repeat: no-repeat; background-position: right center;
    font-variant-numeric: tabular-nums;
  }
  .input--chip select option { background: var(--card); color: var(--foreground); }

  /* KPI strip — 3 fat cards */
  .tax-kpis {
    display: grid;
    grid-template-columns: 1.4fr 1fr 1fr;
    gap: var(--s-4);
  }
  .tax-kpi {
    background: var(--card);
    border: 1px solid var(--line);
    border-radius: var(--r-2);
    padding: var(--s-5);
    display: flex; flex-direction: column;
    gap: var(--s-3);
    min-height: 130px;
  }
  .tax-kpi__top {
    display: flex; align-items: center; justify-content: space-between;
    gap: var(--s-2);
  }
  .tax-kpi__label {
    font-size: var(--t-body);
    color: var(--foreground);
    font-weight: 500;
  }
  .tax-kpi__icon {
    color: var(--muted-foreground);
    display: grid; place-items: center;
  }
  .tax-kpi__value {
    font-size: 32px;
    font-weight: 500;
    line-height: 1;
    font-variant-numeric: tabular-nums;
    letter-spacing: var(--tr-tight);
  }
  .tax-kpi__value--neon { /* applied when there IS a liability */ }
  .tax-kpi__sub {
    font-size: var(--t-small);
    color: var(--muted-foreground);
  }

  /* panel grid */
  .panel-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: var(--s-4);
  }
  .panel {
    background: var(--card);
    border: 1px solid var(--line);
    border-radius: var(--r-2);
    overflow: hidden;
    display: flex; flex-direction: column;
    min-height: 340px;
  }
  .panel__head {
    display: flex; align-items: center; justify-content: space-between;
    padding: var(--s-4) var(--s-5);
    border-bottom: 1px solid var(--line);
    gap: var(--s-3);
  }
  .panel__title { font-size: var(--t-h2); font-weight: 500; letter-spacing: var(--tr-tight); margin: 0; line-height: 1; }

  .panel__body {
    flex: 1;
    display: flex; align-items: center; justify-content: center;
    padding: var(--s-7);
  }

  /* empty state */
  .empty {
    display: flex; flex-direction: column; align-items: center; gap: var(--s-3);
    color: var(--muted-foreground);
    font-size: var(--t-small);
    text-align: center;
  }
  .empty__icon {
    width: 56px; height: 56px;
    color: var(--faint-foreground);
    display: grid; place-items: center;
  }

  /* detailed table */
  .detail-table { width: 100%; border-collapse: collapse; font-variant-numeric: tabular-nums; }
  .detail-table th, .detail-table td {
    padding: var(--s-3) var(--s-4);
    border-bottom: 1px solid var(--line);
    font-size: var(--t-small);
    text-align: right;
  }
  .detail-table th {
    color: var(--muted-foreground);
    font-size: var(--t-micro);
    font-weight: 500;
    letter-spacing: var(--tr-wider);
    text-transform: uppercase;
  }
  .detail-table th:first-child, .detail-table td:first-child { text-align: left; padding-left: var(--s-5); }
  .detail-table th:last-child, .detail-table td:last-child { padding-right: var(--s-5); }
  .detail-table tbody tr:last-child td { border-bottom: none; }

  /* aggregate stat blocks */
  .agg {
    padding: var(--s-5);
    display: flex; flex-direction: column;
    gap: var(--s-4);
  }
  .agg__row {
    display: flex; align-items: baseline; justify-content: space-between;
    gap: var(--s-3);
    padding-bottom: var(--s-3);
    border-bottom: 1px dashed var(--line);
  }
  .agg__row:last-child { border-bottom: none; padding-bottom: 0; }
  .agg__label {
    font-size: var(--t-small);
    color: var(--muted-foreground);
  }
  .agg__value {
    font-size: 22px;
    font-weight: 500;
    font-variant-numeric: tabular-nums;
    letter-spacing: var(--tr-tight);
  }
  .agg__value--gain { color: var(--gain); }
  .agg__value--loss { color: var(--loss); }
  .agg__value--neutral { color: var(--foreground); }
  .agg__value u { text-decoration: none; font-size: 0.62em; color: var(--muted-foreground); margin-left: 6px; font-weight: 400; }

  /* help icon */
  .help-icon {
    color: var(--muted-foreground);
    cursor: help;
    transition: color 140ms ease;
    display: inline-grid; place-items: center;
  }
  .help-icon:hover { color: var(--primary); }

  /* entrance */
  @keyframes rise {
    from { opacity: 0; transform: translateY(6px); }
    to { opacity: 1; transform: translateY(0); }
  }
  .rise { animation: rise 600ms cubic-bezier(.2,.7,.2,1) both; }
  .d0 { animation-delay: 0ms; }
  .d1 { animation-delay: 60ms; }
  .d2 { animation-delay: 120ms; }
  .d3 { animation-delay: 180ms; }
  .d4 { animation-delay: 260ms; }

  @media (max-width: 1100px) {
    .tax-kpis { grid-template-columns: 1fr 1fr; }
    .tax-kpi:first-child { grid-column: 1 / -1; }
    .panel-grid { grid-template-columns: 1fr; }
  }
  @media (max-width: 700px) {
    .app { grid-template-columns: 1fr; }
    .sidebar { display: none; }
    .tax-kpis { grid-template-columns: 1fr; }
  }
</style>
</head>
<body>

<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>

<script type="text/babel" src="tweaks-panel.jsx"></script>
<script type="text/babel" src="settings-modal.jsx"></script>
<script type="text/babel" src="tax-app.jsx"></script>

</body>
</html>
